<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Personal Finances</title>

<meta name="theme-color" content="#0a0c0f">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Finances">

<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<style>
/* ══════════════════════════════════════════════════════
   GLOBAL CHROME & THEME (Matching the Options Tab)
══════════════════════════════════════════════════════ */
:root {
  --bg:#0a0c0f; --surface:#111418; --surface2:#181c22; --border:#1e2530;
  --green:#00e5a0; --green-dim:rgba(0,229,160,0.12);
  --red:#ff4e6a;   --red-dim:rgba(255,78,106,0.12);
  --yellow:#ffd166;--yellow-dim:rgba(255,209,102,0.12);
  --blue:#4eb5ff;  --blue-dim:rgba(78,181,255,0.1);
  --text:#e8edf3;  --muted:#5a6478; --muted2:#8892a4;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;overflow-x:hidden; -webkit-tap-highlight-color: transparent;}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,229,160,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,160,0.03) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none;z-index:0;}

.wrapper{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:24px 16px;}

/* Header */
header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border);}
.logo{display:flex;flex-direction:column;gap:4px;}
.logo-title{font-family:'Syne',sans-serif;font-weight:800;font-size:24px;letter-spacing:-0.5px;}
.logo-title span{color:var(--blue);} /* Changed to blue to distinguish tabs */
.logo-sub{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}

/* Bottom Tabs */
.bottom-tabs { display: flex; flex-direction: column; gap: 12px; margin-top: 32px; margin-bottom: 24px; }
@media(min-width: 600px) { .bottom-tabs { flex-direction: row; justify-content: center; } }
.btm-tab {
  font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase;
  padding: 14px 24px; cursor: pointer; border: 1px solid var(--border); border-radius: 8px; text-align: center;
  background: var(--surface); color: var(--muted); text-decoration: none; transition: all 0.2s; flex: 1; max-width: 300px; margin: 0 auto;
}
.btm-tab:hover { border-color: var(--muted); color: var(--text); }
.btm-tab.active { border-color: var(--blue); color: var(--blue); background: var(--blue-dim); }

/* Temporary Placeholder Styling */
.placeholder-box {
  border: 1px dashed var(--muted); border-radius: 12px; padding: 48px 24px; text-align: center; color: var(--muted2);
  font-family: 'Inter', sans-serif; font-size: 14px; margin-bottom: 24px;
}
</style>
</head>
<body>

<div class="wrapper">
  <header>
    <div class="logo">
      <div class="logo-title">PERSONAL <span>FINANCES</span></div>
      <div class="logo-sub">Net Worth & Runway Tracker</div>
    </div>
  </header>

  <div class="placeholder-box">
    Awaiting Data Structure to build KPI cards and Charts...
  </div>

  <div class="bottom-tabs">
    <a href="index.html" class="btm-tab">Options Dashboard</a>
    <a href="personal_finances.html" class="btm-tab active">Personal Finances</a>
  </div>
</div>

</body>
</html>
