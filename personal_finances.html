<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Personal Finances</title>

<meta name="theme-color" content="#0a0c0f">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Finances">
<link rel="apple-touch-icon" href="icon-192.png">

<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<style>
/* ══════════════════════════════════════════════════════
   GLOBAL CHROME & THEME 
══════════════════════════════════════════════════════ */
:root {
  --bg:#0a0c0f; --surface:#111418; --surface2:#181c22; --border:#1e2530;
  --green:#00e5a0; --green-dim:rgba(0,229,160,0.12);
  --red:#ff4e6a;   --red-dim:rgba(255,78,106,0.12);
  --yellow:#ffd166;--yellow-dim:rgba(255,209,102,0.12);
  --blue:#4eb5ff;  --blue-dim:rgba(78,181,255,0.1);
  --text:#e8edf3;  --muted:#5a6478; --muted2:#8892a4;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden; -webkit-tap-highlight-color: transparent;}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(78,181,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(78,181,255,0.02) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none;z-index:0;}

/* Scrollbar styles */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }

.wrapper{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:32px 24px;}

/* Header */
header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:32px;padding-bottom:16px;border-bottom:1px solid var(--border);}
.logo{display:flex;flex-direction:column;gap:4px;}
.logo-title{font-family:'Syne',sans-serif;font-weight:800;font-size:26px;letter-spacing:-0.5px;color:var(--text);}
.logo-title span{color:var(--blue);} 
.logo-sub{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;font-family:'DM Mono',monospace;}
.header-right{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:8px;}
.date-str{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;}

/* Setup / Load screen */
.pf-setup{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px;max-width:520px;margin:80px auto;text-align:center;}
.pf-setup-title{font-size:22px;font-weight:700;color:var(--blue);margin-bottom:16px;font-family:'Syne',sans-serif;}
.pf-setup-sub{font-size:13px;color:var(--muted2);margin-bottom:24px;line-height:1.6;}
.pf-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.pf-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.pf-error{background:rgba(255,78,106,0.1);border:1px solid rgba(255,78,106,0.3);border-radius:8px;padding:12px;color:var(--red);font-size:13px;margin-top:14px;font-family:'DM Mono',monospace;}
.hidden{display:none !important;}

/* PF KPI */
.pf-kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px;margin-bottom:24px;}
.pf-kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;transition:border-color 0.2s;position:relative;overflow:hidden;}
.pf-kpi-card:hover{border-color:var(--muted);}
.pf-kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.pf-kpi-card.green::before{background:linear-gradient(90deg,transparent,var(--green),transparent);}
.pf-kpi-card.blue::before{background:linear-gradient(90deg,transparent,var(--blue),transparent);}
.pf-kpi-card.red::before{background:linear-gradient(90deg,transparent,var(--red),transparent);}
.pf-kpi-label{font-size:12px;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:8px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.pf-kpi-value{font-size:42px;font-weight:800;margin-bottom:6px;font-family:'Syne',sans-serif;letter-spacing:-1px;}
.pf-kpi-value.green{color:var(--green);}
.pf-kpi-value.blue{color:var(--blue);}
.pf-kpi-value.red{color:var(--red);}
.pf-kpi-sub{font-size:12px;color:var(--muted2);min-height:16px;}

/* Chart */
.pf-chart-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:32px;}
.pf-chart-title{font-size:22px;font-weight:700;margin-bottom:24px;font-family:'Syne',sans-serif;color:var(--text);letter-spacing:-0.5px;display:flex;align-items:center;gap:8px;}
.pf-chart-title span {color:var(--green);}

/* Controls & Bottom Tabs */
.refresh-btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500;
  cursor: pointer; transition: all 0.2s; margin: 16px auto 0;
  padding: 12px 24px; border-radius: 8px; width: 100%; max-width: 300px;
}
.refresh-btn:hover { border-color: var(--muted); }
.refresh-btn svg { width: 18px; height: 18px; fill: currentColor; }

.bottom-tabs { display: flex; flex-direction: column; gap: 12px; margin-top: 48px; margin-bottom: 24px; }
@media(min-width: 600px) { .bottom-tabs { flex-direction: row; justify-content: center; } }
.btm-tab {
  font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase;
  padding: 14px 24px; cursor: pointer; border: 1px solid var(--border); border-radius: 8px; text-align: center;
  background: var(--surface); color: var(--muted); text-decoration: none; transition: all 0.2s; flex: 1; max-width: 300px; margin: 0 auto;
}
.btm-tab:hover { border-color: var(--muted); color: var(--text); }
.btm-tab.active { border-color: var(--blue); color: var(--blue); background: var(--blue-dim); }
</style>
</head>
<body>

<div class="wrapper">
  <header>
    <div class="logo">
      <div class="logo-title">PERSONAL <span>FINANCES</span></div>
      <div class="logo-sub">Net Worth & Asset Tracker</div>
    </div>
    <div class="header-right">
      <div class="date-str" id="pf-date-str">Last updated: —</div>
    </div>
  </header>

  <div id="pf-setup" class="pf-setup">
    <div class="pf-setup-title">Syncing Financial Data</div>
    <div id="pf-loading" class="pf-loading">
      <div class="pf-spinner"></div>
      <div class="pf-setup-sub" style="font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:1px;margin:0;">Fetching from Sheet...</div>
    </div>
    <div id="pf-error" class="pf-error hidden"></div>
  </div>

  <div id="pf-dashboard" class="hidden">
    
    <div class="pf-kpi-grid">
      <div class="pf-kpi-card green">
        <div class="pf-kpi-label">Total Assets</div>
        <div class="pf-kpi-value green" id="pf-total-assets">—</div>
        <div class="pf-kpi-sub" id="pf-assets-month">Latest Month</div>
      </div>
      <div class="pf-kpi-card blue">
        <div class="pf-kpi-label">Net Cash</div>
        <div class="pf-kpi-value blue" id="pf-net-cash">—</div>
        <div class="pf-kpi-sub">Excludes Real Estate & Growth</div>
      </div>
      <div class="pf-kpi-card red">
        <div class="pf-kpi-label">Liabilities</div>
        <div class="pf-kpi-value red" id="pf-liabilities">—</div>
        <div class="pf-kpi-sub">Total negative balances</div>
      </div>
    </div>

    <div class="pf-chart-card">
      <div class="pf-chart-title"><span>↗</span> Trend</div>
      <div style="position:relative;height:380px;">
        <canvas id="pf-trend-chart"></canvas>
      </div>
    </div>

    <div style="text-align:center;">
      <button class="refresh-btn" onclick="pfLoadData()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 20q-3.35 0-5.675-2.325Q4 15.35 4 12q0-3.35 2.325-5.675Q8.65 4 12 4q1.725 0 3.3.712T18 6.75V4h2v7h-7V9h3.2q-1.05-1.8-2.825-2.9Q13.6 5 12 5 9.075 5 7.038 7.038 5 9.075 5 12q0 2.925 2.038 4.962Q9.075 19 12 19q2.5 0 4.388-1.5T18.8 13h2.05q-.5 3.45-3.175 5.725Q15.05 20 12 20Z"/></svg>
        Refresh Data
      </button>
    </div>
  </div>

  <div class="bottom-tabs">
    <a href="index.html" class="btm-tab">Options Dashboard</a>
    <a href="personal_finances.html" class="btm-tab active">Personal Finances</a>
  </div>
  
  <div style="text-align:center;font-size:10px;color:var(--muted);letter-spacing:1px;padding-bottom:32px;font-family:'DM Mono',monospace;">
    PERSONAL FINANCES · LIVE DATA
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════
// PERSONAL FINANCE JAVASCRIPT LOGIC
// ════════════════════════════════════════════════════════

const PF_WEBHOOK = 'https://script.google.com/macros/s/AKfycbwfy3qzMBgmINz8ekI26juWmND8TeOSjZhUNhtCn3LIiEfID3pvOVKdxtwRO7GvdL6T/exec';

let pfTrendChart = null;

// Function to determine if an account should be included in "Net Cash"
function isLiquidCash(account, category) {
  const str = (String(account) + ' ' + String(category)).toLowerCase();
  if (str.includes('real estate') || str.includes('growth fund') || str.includes('project')) {
    return false;
  }
  return true;
}

function pfLoadData() {
  document.getElementById('pf-setup').classList.remove('hidden');
  document.getElementById('pf-dashboard').classList.add('hidden');
  document.getElementById('pf-error').classList.add('hidden');

  const cb = 'pfCb_' + Date.now();
  const sc = document.createElement('script');

  // Timeout for offline functionality fallback
  const fallbackTimer = setTimeout(() => {
    delete window[cb];
    if(document.body.contains(sc)) document.body.removeChild(sc);
    console.warn("API timeout, loading fallback data.");
    pfLoadFallback();
  }, 6000);

  window[cb] = function(json) {
    clearTimeout(fallbackTimer);
    delete window[cb];
    document.body.removeChild(sc);

    if (json.error) {
      console.warn("API Error:", json.error);
      pfLoadFallback();
      return;
    }
    
    const lu = new Date(json.lastUpdated);
    document.getElementById('pf-date-str').textContent = 'Live · ' +
      lu.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) + ' ' +
      lu.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});

    // Pass the raw data to the processor
    const detailsRaw = json.data["Details in Raw Format"] || [];
    pfProcessData(detailsRaw);
  };

  sc.onerror = function() {
    clearTimeout(fallbackTimer);
    delete window[cb];
    if(document.body.contains(sc)) document.body.removeChild(sc);
    pfLoadFallback();
  };

  sc.src = PF_WEBHOOK + '?callback=' + cb;
  document.body.appendChild(sc);
}

// Fallback Mock Data matching realistic chart structure (Jun '24 - Feb '26)
function pfLoadFallback() {
  document.getElementById('pf-date-str').textContent = 'Offline Mode';
  
  const mockDates = [
    'Jun 2024','Jul 2024','Aug 2024','Sep 2024','Oct 2024','Nov 2024','Dec 2024',
    'Jan 2025','Feb 2025','Mar 2025','Apr 2025','May 2025','Jun 2025','Jul 2025',
    'Aug 2025','Sep 2025','Oct 2025','Nov 2025','Dec 2025','Jan 2026','Feb 2026'
  ];
  
  let details = [['Month', 'Account', 'Category', 'Value']];
  
  // Generating a smooth curve dataset similar to the screenshot
  mockDates.forEach((month, index) => {
    // Math logic to simulate the chart's rise
    let baseAsset = 1000000 + (index * 15000);
    if (index > 6) baseAsset += 200000; // Jump in Jan 2025
    if (index > 14) baseAsset += 150000; // Jump in Sep 2025
    
    let baseCash = 300000 + (index * 10000);
    if (index > 6) baseCash += 400000; // Correlating jump
    
    let baseLiab = -120000 + (index * 2000); // Slowly paying off debt
    
    // Push simulated rows
    details.push([month, 'Primary Home', 'Real Estate', baseAsset - baseCash]);
    details.push([month, 'Chase Bank', 'Active Savings', baseCash]);
    details.push([month, 'Mortgage', 'Debt', baseLiab]);
  });

  pfProcessData(details);
}

function pfProcessData(detailsRaw) {
  // Ignore header rows
  const detailsRows = detailsRaw.length > 1 ? detailsRaw.slice(1) : detailsRaw;
  const monthlyData = {};

  // Parse Details (Expected: A=Month, B=Account, C=Category, D=Value)
  detailsRows.forEach(row => {
    const rawMonth = String(row[0]||'').trim();
    const account = String(row[1]||'').trim();
    const category = String(row[2]||'').trim();
    let value = parseFloat(String(row[3]).replace(/[$,]/g,''));

    if (!rawMonth || isNaN(value)) return;

    // Convert string "Feb 2026" or "2026-02-01" to Date object for proper sorting
    const d = new Date(rawMonth + (rawMonth.length <= 8 ? ' 01' : ''));
    if (isNaN(d)) return;

    // Create a normalized YYYY-MM key for grouping
    const monthKey = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');

    if (!monthlyData[monthKey]) {
      monthlyData[monthKey] = { dateObj: d, assets: 0, cash: 0, liabilities: 0 };
    }

    if (value >= 0) {
      monthlyData[monthKey].assets += value;
      // Filter Logic for Net Cash
      if (isLiquidCash(account, category)) {
        monthlyData[monthKey].cash += value;
      }
    } else {
      monthlyData[monthKey].liabilities += value; // Keep as negative to match chart representation
    }
  });

  // Sort dates newest to oldest to grab the latest month for KPIs
  const sortedKeysDesc = Object.keys(monthlyData).sort((a,b) => monthlyData[b].dateObj - monthlyData[a].dateObj);
  
  if (sortedKeysDesc.length === 0) return;

  // ── UPDATE TOP KPI CARDS ──
  const currentMonthKey = sortedKeysDesc[0];
  const curData = monthlyData[currentMonthKey];
  
  // Format top KPI month name nicely
  const curDateLabel = curData.dateObj.toLocaleString('en-US', { month: 'short', year: 'numeric' });
  
  document.getElementById('pf-total-assets').textContent = '$' + (curData.assets / 1000000).toFixed(2) + 'M';
  document.getElementById('pf-assets-month').textContent = 'For ' + curDateLabel;
  document.getElementById('pf-net-cash').textContent = '$' + (curData.cash / 1000000).toFixed(2) + 'M';
  
  // Format liabilities (handle negative sign visually)
  let formattedLiab = Math.abs(curData.liabilities);
  if (formattedLiab >= 1000000) {
    document.getElementById('pf-liabilities').textContent = '-$' + (formattedLiab / 1000000).toFixed(2) + 'M';
  } else {
    document.getElementById('pf-liabilities').textContent = '-$' + (formattedLiab / 1000).toFixed(1) + 'K';
  }

  // ── BUILD CHART DATA (June 2024 onwards) ──
  const cutoffDate = new Date('2024-06-01T00:00:00');
  
  // Filter and sort chronologically (oldest to newest) for chart plotting
  const chartKeys = Object.keys(monthlyData)
    .filter(key => monthlyData[key].dateObj >= cutoffDate)
    .sort((a,b) => monthlyData[a].dateObj - monthlyData[b].dateObj);

  const labels = chartKeys.map(key => {
    const d = monthlyData[key].dateObj;
    return d.toLocaleString('en-US', { month: 'short' }) + " '" + d.toLocaleString('en-US', { year: '2-digit' });
  });

  const assetsData = chartKeys.map(key => monthlyData[key].assets);
  const cashData = chartKeys.map(key => monthlyData[key].cash);
  const liabData = chartKeys.map(key => monthlyData[key].liabilities);

  pfRenderChart(labels, assetsData, cashData, liabData);
  
  document.getElementById('pf-setup').classList.add('hidden');
  document.getElementById('pf-dashboard').classList.remove('hidden');
}

// Custom Chart.js Plugin to draw the labels at the beginning and end of the lines
const customLineLabelsPlugin = {
  id: 'customLineLabels',
  afterDatasetsDraw(chart) {
    const { ctx } = chart;
    chart.data.datasets.forEach((dataset, i) => {
      const meta = chart.getDatasetMeta(i);
      if (!meta.hidden && meta.data.length > 0) {
        
        // Draw End Value Label (Right Side)
        const lastPoint = meta.data[meta.data.length - 1];
        const lastValue = dataset.data[dataset.data.length - 1];
        const absVal = Math.abs(lastValue);
        
        // Format value to M or K
        let valStr = absVal >= 1000000 ? '$' + (absVal/1000000).toFixed(2) + 'M' : '$' + (absVal/1000).toFixed(1) + 'K';
        if (lastValue < 0) valStr = '-' + valStr;
        
        ctx.fillStyle = dataset.borderColor;
        ctx.font = "500 11px 'Inter', sans-serif";
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        ctx.fillText('  ' + valStr, lastPoint.x, lastPoint.y);

        // Draw Start Category Label (Left Side)
        const firstPoint = meta.data[0];
        ctx.textAlign = 'left';
        ctx.textBaseline = 'bottom';
        ctx.fillText(dataset.label, firstPoint.x, firstPoint.y - 8);
      }
    });
  }
};

function pfRenderChart(labels, assetsData, cashData, liabData) {
  if (pfTrendChart) { pfTrendChart.destroy(); pfTrendChart=null; }
  const ctx = document.getElementById('pf-trend-chart');
  
  Chart.register(customLineLabelsPlugin);

  pfTrendChart = new Chart(ctx, {
    type:'line',
    data:{
      labels,
      datasets:[
        {label:'Assets', data:assetsData, borderColor:'#00e5a0', borderWidth: 2.5, tension:0.4, pointRadius:0, pointHoverRadius:6},
        {label:'Cash', data:cashData, borderColor:'#4eb5ff', borderWidth: 2.5, tension:0.4, pointRadius:0, pointHoverRadius:6},
        {label:'Liabilities', data:liabData, borderColor:'#ff4e6a', borderWidth: 2.5, tension:0.4, pointRadius:0, pointHoverRadius:6}
      ]
    },
    options:{
      responsive:true, 
      maintainAspectRatio:false, 
      interaction:{mode:'index',intersect:false},
      layout: {
        padding: { right: 60 } // Creates room on the right for the M/K text labels
      },
      plugins:{
        legend:{display:false}, // Hidden because we use inline labels now
        tooltip:{
          backgroundColor:'#111418', borderColor:'#1e2530', borderWidth:1, titleColor:'#e8edf3', bodyColor:'#8892a4', padding:12,
          callbacks:{
            label: c => {
              const absVal = Math.abs(c.parsed.y);
              let str = absVal >= 1000000 ? '$' + (absVal/1000000).toFixed(2) + 'M' : '$' + (absVal/1000).toFixed(1) + 'K';
              if (c.parsed.y < 0) str = '-' + str;
              return ` ${c.dataset.label}: ${str}`;
            }
          }
        }
      },
      scales:{
        y:{
          display:false, // Hides the Y axis entirely to match screenshot
          beginAtZero:false
        },
        x:{
          ticks:{color:'#5a6478',font:{size:10,family:"'DM Mono', monospace"}, maxRotation: 0},
          grid:{color:'rgba(255,255,255,0.05)', drawBorder:false, borderDash: [4, 4]}
        }
      }
    }
  });
}

// Init dashboard on load
pfLoadData();

// Service Worker for offline capability
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .catch(err => console.log('SW registration failed:', err));
  });
}
</script>
</body>
</html>
