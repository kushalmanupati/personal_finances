<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Personal Finances</title>

<meta name="theme-color" content="#0a0c0f">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Finances">
<link rel="apple-touch-icon" href="icon-192.png">

<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500;600&family=Syne:wght@400;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<style>
/* ══════════════════════════════════════════════════════
   GLOBAL CHROME & THEME 
══════════════════════════════════════════════════════ */
:root {
  --bg:#0a0c0f; --surface:#111418; --surface2:#181c22; --border:#1e2530;
  --green:#00e5a0; --green-dim:rgba(0,229,160,0.12);
  --red:#ff4e6a;   --red-dim:rgba(255,78,106,0.12);
  --yellow:#ffd166;--yellow-dim:rgba(255,209,102,0.12);
  --blue:#4eb5ff;  --blue-dim:rgba(78,181,255,0.1);
  --purple:#c77dff;--purple-dim:rgba(199,125,255,0.12);
  --text:#e8edf3;  --muted:#5a6478; --muted2:#8892a4;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden; -webkit-tap-highlight-color: transparent;}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(78,181,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(78,181,255,0.02) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none;z-index:0;}

/* Scrollbar styles */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }

.wrapper{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:32px 24px;}

/* Header */
header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border);}
.logo{display:flex;flex-direction:column;gap:4px;}
.logo-title{font-family:'Syne',sans-serif;font-weight:800;font-size:24px;letter-spacing:-0.5px;color:var(--text);}
.logo-title span{color:var(--blue);} 
.logo-sub{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;font-family:'DM Mono',monospace;}
.header-right{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:8px;}
.date-str{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;}

/* Setup / Load screen */
.pf-setup{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px;max-width:520px;margin:80px auto;text-align:center;}
.pf-setup-title{font-size:22px;font-weight:700;color:var(--blue);margin-bottom:16px;font-family:'Syne',sans-serif;}
.pf-setup-sub{font-size:13px;color:var(--muted2);margin-bottom:24px;line-height:1.6;}
.pf-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.pf-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.pf-error{background:rgba(255,78,106,0.1);border:1px solid rgba(255,78,106,0.3);border-radius:8px;padding:12px;color:var(--red);font-size:13px;margin-top:14px;font-family:'DM Mono',monospace;}
.hidden{display:none !important;}

/* PF KPI */
.pf-kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:12px;margin-bottom:20px;}
.pf-kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 20px;transition:border-color 0.2s;position:relative;overflow:hidden;}
.pf-kpi-card:hover{border-color:var(--muted);}
.pf-kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.pf-kpi-card.green::before{background:linear-gradient(90deg,transparent,var(--green),transparent);}
.pf-kpi-card.blue::before{background:linear-gradient(90deg,transparent,var(--blue),transparent);}
.pf-kpi-card.red::before{background:linear-gradient(90deg,transparent,var(--red),transparent);}
.pf-kpi-label{font-size:11px;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:8px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.pf-kpi-value{font-size:32px;font-weight:800;margin-bottom:4px;font-family:'Syne',sans-serif;letter-spacing:-1px;}
.pf-kpi-value.green{color:var(--green);}
.pf-kpi-value.blue{color:var(--blue);}
.pf
